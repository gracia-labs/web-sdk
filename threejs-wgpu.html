<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gracia Three.js WebGPU</title>
    <script type="importmap">
    { "imports": {
        "@gracia/web-sdk": "./dist/GraciaAIO.__BUILD_HASH__.js",
        "@gracia/web-sdk/wasm": "./dist/GraciaWebCore.__BUILD_HASH__.js"
    } }
    </script>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #000; color: #fff;
        --dim: rgba(255,255,255,.4); --mid: rgba(255,255,255,.65);
        --hi: #fff; --sh: 0 1px 3px rgba(0,0,0,.7);
        --glass: rgba(18,18,22,.72); --glass-border: rgba(255,255,255,.1);
        --hover: rgba(255,255,255,.08);
        --panel-r: 10px;
    }
    canvas { display: block; }

    .ov { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 16px; }
    .ov > * { pointer-events: auto; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .bot { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .spacer { flex: 1; pointer-events: none; }

    .panel {
        display: flex; align-items: center; gap: 6px; padding: 6px 10px;
        background: var(--glass); backdrop-filter: blur(18px) saturate(1.4);
        border: 1px solid var(--glass-border); border-radius: var(--panel-r);
        box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .lbl { font: 600 9px/1 inherit; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); text-shadow: var(--sh); }
    .divider { width: 1px; height: 18px; background: var(--glass-border); margin: 0 2px; flex-shrink: 0; }

    .btn {
        padding: 5px 11px; border: 0; border-radius: 6px;
        background: transparent; color: var(--dim); cursor: pointer;
        font: 600 11px/1.1 inherit; white-space: nowrap;
        text-shadow: var(--sh); transition: color .15s, background .15s;
    }
    .btn:hover:not(:disabled) { color: var(--hi); background: var(--hover); }
    .btn:disabled { opacity: .2; cursor: not-allowed; }
    .btn.on, .btn.active { color: var(--hi); background: rgba(255,255,255,.1); }

    .vb { display: flex; align-items: center; gap: 10px; padding: 2px 0; width: 100%; }
    .vb-btn { width: 30px; min-width: 30px; height: 30px; border: 0; border-radius: 50%; background: rgba(255,255,255,.12); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background .15s; color: #fff; font-size: 14px; }
    .vb-btn:hover { background: rgba(255,255,255,.22); }
    .vb-track { flex: 1; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; position: relative; cursor: pointer; }
    .vb-fill { position: absolute; inset: 0 auto 0 0; border-radius: 2px; background: rgba(255,255,255,.45); width: 0; pointer-events: none; }
    .vb-thumb { position: absolute; top: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%,-50%); left: 0; box-shadow: 0 1px 6px #0008; }
    .vb-time { color: var(--dim); font: 500 11px/1 inherit; min-width: 70px; text-align: right; text-shadow: var(--sh); }
    .bar-panel { width: min(520px, calc(100% - 32px)); }

    .bot-right { position: fixed; bottom: 16px; right: 16px; z-index: 11; pointer-events: auto; }

    @media (max-width: 720px) {
        .ov { padding: 10px; }
        .top { gap: 8px; flex-wrap: wrap; }
        .panel { padding: 5px 8px; gap: 4px; }
        .btn { padding: 4px 8px; font-size: 10px; }
        .dd-toggle { padding: 4px 20px 4px 8px; font-size: 10px; }
        .hide-sm { display: none; }
        .vb-time { font-size: 10px; min-width: 50px; }
        .bar-panel { width: calc(100% - 20px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ov">
        <div class="top">
            <div class="panel">
                <span class="lbl">WebGPU</span>
                <div class="divider"></div>
                <button type="button" class="btn" id="fileBtn">Open file&hellip;</button>
                <input type="file" id="fileInput" accept=".mint,.sog" style="display:none">
            </div>
            <div class="panel hide-sm">
                <span class="lbl">Gizmo</span>
                <button type="button" class="btn active" id="gizTranslate">W</button>
                <button type="button" class="btn" id="gizRotate">E</button>
                <button type="button" class="btn" id="gizScale">R</button>
            </div>
            <div class="spacer"></div>
        </div>
        <div class="bot">
            <div class="panel bar-panel" id="barWrap"></div>
        </div>
    </div>
    <div class="bot-right">
        <div class="panel"><button type="button" class="btn" id="resetCam">Reset</button></div>
    </div>

    <script type="module">
    import { GraciaPlayer, loadGraciaModule, OrbitControls, SplatsRendererW3, Stats, THREE, TransformControls, WebGPURenderer } from '@gracia/web-sdk';

    const GraciaModule = await loadGraciaModule();

    const $ = id => document.getElementById(id);
    const mk = (tag, cls, par) => { const e = document.createElement(tag); if (cls) e.className = cls; par?.appendChild(e); return e; };
    const clamp = (v, lo = 0, hi = 1) => Math.min(hi, Math.max(lo, v));
    const fmt = t => (!Number.isFinite(t) || t < 0) ? '0:00' : `${~~(t / 60)}:${String(~~t % 60).padStart(2, '0')}`;

    if (!navigator.gpu) { document.body.textContent = 'WebGPU not supported'; throw new Error('No WebGPU'); }

    const moduleOpts = opts => GraciaModule({ ...opts, print: console.log, printErr: console.error });
    const player = await GraciaPlayer.create(moduleOpts, { canvas: document.createElement('canvas') });

    /* ── Three.js WebGPU scene ──────────────────────── */

    const renderer = new WebGPURenderer({ device: player.device, antialias: false, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.6;
    await renderer.init();
    document.body.prepend(renderer.domElement);

    const stats = new Stats();
    stats.dom.style.cssText = 'position:fixed;top:14px;right:16px;z-index:20;cursor:pointer;opacity:0.8;';
    document.body.appendChild(stats.dom);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.05, 10000);
    camera.position.set(0, 1.2, 2.8);

    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true; orbit.dampingFactor = 0.08;
    orbit.target.set(0, 0.3, 0); orbit.update();

    /* ── Lights ── */

    const amb = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 2.0);
    dir.position.set(3, 8, 4);
    scene.add(dir);

    /* ── Ground + scene objects ── */

    const ground = new THREE.Mesh(
        new THREE.CircleGeometry(1.8, 64),
        new THREE.MeshStandardMaterial({ color: 0x9a9590, roughness: 0.75 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const objects = new THREE.Group(); scene.add(objects);

    const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.38, 0.04, 48),
        new THREE.MeshStandardMaterial({ color: 0xc8c0b8, roughness: 0.15, metalness: 0.02 })
    );
    pedestal.position.y = 0.02;
    objects.add(pedestal);

    const chromeSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 48, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.02, metalness: 1.0 })
    );
    chromeSphere.position.set(0.5, 0.08, 0.3);
    objects.add(chromeSphere);

    const matteSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 48, 32),
        new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 1.0, metalness: 0.0 })
    );
    matteSphere.position.set(-0.5, 0.08, 0.3);
    objects.add(matteSphere);

    const torusKnot = new THREE.Mesh(
        new THREE.TorusKnotGeometry(0.06, 0.02, 64, 16),
        new THREE.MeshStandardMaterial({ color: 0xcc6644, roughness: 0.35, metalness: 0.4 })
    );
    torusKnot.position.set(0.4, 0.12, -0.4);
    objects.add(torusKnot);

    const box = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 0.14, 0.14),
        new THREE.MeshStandardMaterial({ color: 0x556060, roughness: 0.7, metalness: 0.05 })
    );
    box.position.set(-0.4, 0.07, -0.4);
    box.rotation.y = Math.PI / 6;
    objects.add(box);

    addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

    /* ── Transform gizmo ─────────────────────────── */

    const gizmo = new TransformControls(camera, renderer.domElement);
    gizmo.addEventListener('dragging-changed', e => { orbit.enabled = !e.value; });
    gizmo.setSize(0.75);
    scene.add(gizmo.getHelper());

    /* ── Gracia splats (WebGPU) ──────────────────────── */

    let splats = null;

    async function initGracia() {
        splats = SplatsRendererW3.attach(player, renderer);
        scene.add(splats.root);
        gizmo.attach(splats.root);
    }

    /* ── File open ─────────────────────────────────── */

    function openFile(src) {
        if (!splats) return;
        const p = splats.player; p.close();
        splats.root.position.set(0, 0, 0);
        splats.root.quaternion.identity();
        splats.root.scale.set(1, 1, 1);
        p.open(src);
        p.play();
    }

    function initFileOpen() {
        $('fileBtn').onclick = async () => {
            if (window.showOpenFilePicker) {
                let handles;
                try {
                    handles = await showOpenFilePicker({
                        types: [{ description: 'Volumetric video', accept: { 'application/octet-stream': ['.mint', '.sog'] } }],
                    });
                } catch { return; }
                const handle = handles[0];
                if (handle.name.endsWith('.sog')) {
                    const f = await handle.getFile();
                    openFile({ file: f, type: 'static' });
                } else {
                    openFile({ localFile: handle });
                }
            } else {
                $('fileInput').click();
            }
        };
        $('fileInput').onchange = e => {
            const f = e.target.files[0]; if (!f) return;
            e.target.value = '';
            openFile(f.name.endsWith('.sog') ? { file: f, type: 'static' } : { file: f });
        };
    }

    /* ── Player bar ──────────────────────────────── */

    function mountBar(container) {
        const bar = mk('div', 'vb', container), btn = mk('button', 'vb-btn', bar);
        const track = mk('div', 'vb-track', bar), fill = mk('div', 'vb-fill', track);
        const thumb = mk('div', 'vb-thumb', track), time = mk('span', 'vb-time', bar);
        const ICO = { play: '\u25B6', pause: '\u23F8', spin: '\u27F3' };
        let cur = '', drag = false;

        const pos = n => fill.style.width = thumb.style.left = `${n * 100}%`;
        const pct = e => clamp((e.clientX - track.getBoundingClientRect().left) / track.offsetWidth);
        const dur = () => splats?.player.duration ?? 0;

        function icon(s) {
            if (s === cur) return; cur = s;
            const sz = s === 'play' ? 14 : 12, ml = s === 'play' ? ';margin-left:2px' : '';
            const anim = s === 'spin' ? ';animation:spin .7s linear infinite;display:inline-block' : '';
            btn.innerHTML = `<span style="color:#fff;font-size:${sz}px${ml}${anim}">${ICO[s]}</span>`;
        }
        icon('play');
        btn.onclick = () => { if (!splats) return; const p = splats.player; p.isPlaying ? p.pause() : p.play(); };

        track.onpointerdown = e => { e.preventDefault(); drag = true; track.setPointerCapture(e.pointerId); pos(pct(e)); splats?.player.seek(pct(e) * dur()); };
        track.onpointermove = e => { if (!drag) return; pos(pct(e)); splats?.player.seek(pct(e) * dur()); };
        track.onpointerup = e => { drag = false; track.releasePointerCapture(e.pointerId); };
        track.onpointercancel = () => { drag = false; };

        return () => {
            if (!splats) return;
            const p = splats.player;
            icon(p.isBuffering ? 'spin' : p.isPlaying ? 'pause' : 'play');
            const c = p.currentTime, d = dur();
            if (!drag && d > 0) pos(clamp(c / d));
            time.textContent = `${fmt(c)} / ${fmt(d)}`;
        };
    }

    /* ── Gizmo controls ──────────────────────────── */

    function setGizmoMode(mode) {
        gizmo.setMode(mode);
        $('gizTranslate').classList.toggle('active', mode === 'translate');
        $('gizRotate').classList.toggle('active', mode === 'rotate');
        $('gizScale').classList.toggle('active', mode === 'scale');
    }
    $('gizTranslate').onclick = () => setGizmoMode('translate');
    $('gizRotate').onclick    = () => setGizmoMode('rotate');
    $('gizScale').onclick     = () => setGizmoMode('scale');

    addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.key.toLowerCase()) {
            case 'w': setGizmoMode('translate'); break;
            case 'e': setGizmoMode('rotate'); break;
            case 'r': setGizmoMode('scale'); break;
        }
    });

    $('resetCam').onclick = () => { camera.position.set(0, 1.2, 2.8); orbit.target.set(0, 0.3, 0); orbit.update(); };

    /* ── Render loop ─────────────────────────────── */

    const timer = new THREE.Timer();
    let tickBar;

    function animate() {
        requestAnimationFrame(animate);
        stats.begin();
        timer.update();
        const dt = timer.getDelta();
        orbit.update();
        torusKnot.rotation.x += dt * 0.5; torusKnot.rotation.y += dt * 0.3;

        splats.render(renderer, scene, camera);

        tickBar?.();
        stats.end();
    }

    /* ── Bootstrap ───────────────────────────────── */

    (async () => {
        try {
            initFileOpen();
            tickBar = mountBar($('barWrap'));
            await initGracia();
            animate();
        } catch (e) { console.error(e); }
    })();
    </script>
</body>
</html>
